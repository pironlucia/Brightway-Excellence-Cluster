.canvas {
  overflow: visible;
}
.canvas .wrapper.outer &gt; .background {
  fill: #FFFFFF;
}
.canvas .wrapper.inner &gt; .background {
  fill: #FFFFFF;
  cursor: move;
}
.canvas .background {
  fill: #FFFFFF;
  stroke: #333333;
  cursor: move;
}
.canvas .panCanvas {
  cursor: click;
}

.canvas .minimap {
  stroke: #000000; /* #111111 */
  stroke-width: 1px;
}

.canvas .minimap .frame {
  pointer-events: all;
}

.canvas .minimap .container {
  stroke: #000000; /* #111111 */
  /*stroke-width: 1px;*/
  /*border: 1px solid #999;*/
}

.canvas .minimap .frame .background {
  stroke: #FF0000; /* #111111 */
  stroke-width: 10px;
  fill-opacity: 0.1;   /*grey shade of mini-map*/
  fill: #FFFFFF; /* #FF0000 */
  /*fill: url(#minimapGradient_qwpyza); */
  filter: url(#minimapDropShadow_qwpyza);
  cursor: move;
  border: 1px solid #999;
}

/*
.cluster rect {
  stroke: #333;
  fill: #000;
  fill-opacity: 0.1;
  stroke-width: 1.5px;
}*/

h1, h2 {
  color: #333;
}

/*textarea {
  width: 800px;
}*/

text {
  font-family: sans-serif;
  font-size: 14px;
  /* no effect:
  text-align: center;
  word-wrap: break-word;
  width: 50px;
  max-width: 60px;
  */
}

.activityNameText {
    color:black;
    text-align: center;
}
.locationText {
    color: grey;
    text-align: center;
    /*font-weight:bold;*/
}
.edgeText {
    color:darkblue;
    text-align: center;
}

.node {
    fill: black;  /* text color of nodes*/
    /* no effect:
    white-space: nowrap;
    */
}

.node rect {
  stroke: #333;
  fill: #fff;
  stroke-width: 3px;
}

.node.demand {
  /*stroke: #333;  */
  font-weight: bold
}

.node.demand rect {
  stroke: darkblue;
  fill: #fff;
  stroke-width: 4px;
}

.node.market rect {
  stroke: #ed9736;
  fill: #fff;
  stroke-width: 3px;
}

.node.marketgroup rect {
  stroke: #ffc34c;
  fill: #fff;
  stroke-width: 3px;
}

.node.treatment rect {
  stroke: #f4425c;
  fill: #fff;
  stroke-width: 3px;
}

